# Cloudflare Worker config (unified Workers & Pages).
# Deploys a single Worker that serves the static frontend from ./public via the
# ASSETS binding and handles the API route /api/transcribe (see src/index.ts).
#
# Deploy with the default command in Cloudflare's Git build:  npx wrangler deploy
name = "glas"
main = "src/index.ts"
compatibility_date = "2026-06-28"

# Static frontend assets. Requests that match a file here are served directly;
# anything else (e.g. /api/transcribe) runs the Worker in src/index.ts.
[assets]
directory = "./public"
binding = "ASSETS"

# Non-secret config. ELEVENLABS_BASE_URL is set here (not sensitive) so it always
# survives a redeploy. This account uses ElevenLabs EU data residency, and an EU
# key only works against the EU host. Remove/blank this for a global account.
[vars]
ELEVENLABS_BASE_URL = "https://api.eu.residency.elevenlabs.io"

# The SECRET key is NOT here (never commit it). Set ELEVENLABS_API_KEY in the
# dashboard (Settings > Variables and Secrets, type = Secret) or via:
#   npx wrangler secret put ELEVENLABS_API_KEY
